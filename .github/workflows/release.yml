name: Release image

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: vorticon/vortnotes
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VORTNOTES_VERSION=${{ github.ref_name }}
      - uses: anchore/sbom-action@v0
        with:
          image: vorticon/vortnotes@${{ steps.build.outputs.digest }}
          artifact-name: vortnotes-${{ github.ref_name }}.spdx.json
      - uses: sigstore/cosign-installer@v3
      - env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes vorticon/vortnotes@${DIGEST}
