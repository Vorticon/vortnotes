{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:720px;margin:40px auto;padding:28px;">
  <h1 style="margin:0 0 8px 0;font-size:28px;">404 — Not Found</h1>
  <p style="margin:0 0 18px 0;opacity:.85;">
    The note or page you’re looking for doesn’t exist (or may have been deleted).
  </p>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <a class="btn" href="{{ url_for('index') }}">Back to Notes</a>
    <a class="btn btn-secondary" href="javascript:history.back()">Go Back</a>
  </div>
</div>
{% endblock %}
