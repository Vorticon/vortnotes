{% extends "base.html" %}
{% block content %}
<div class="card vn-sticky-shell">
  <div class="vn-sticky-header">
    <div>
      <h2>Sticky Notes</h2>
      <div class="muted">Quick notes stored with the selected Vortnotes database.</div>
    </div>
    <div class="vn-sticky-actions">
      <input class="input" id="vnStickySearch" type="search" placeholder="Search notes…" aria-label="Search sticky notes">
      {% if can_edit %}<button class="btn primary" type="button" id="vnStickyAdd">Add note</button>{% endif %}
      <a class="btn" href="{{ url_for('content') }}">Back to Content</a>
    </div>
  </div>
  {% if not can_edit %}<div class="help" style="margin-top:10px;">Unlock this database to edit sticky notes.</div>{% endif %}
  <div id="vnStickyStatus" class="vn-sticky-status" aria-live="polite"></div>
  <div id="vnStickyGrid" class="vn-sticky-grid"></div>
</div>
<script>
window.VORTNOTES_STICKY_NOTES = {{ notes|tojson }};
window.VORTNOTES_STICKY_CONFIG = {
  saveUrl: {{ url_for('sticky_note_save')|tojson }},
  deleteUrl: {{ url_for('sticky_note_delete')|tojson }},
  canEdit: {{ 'true' if can_edit else 'false' }}
};
</script>
<script src="{{ url_for('static', filename='sticky_notes.js') }}"></script>
<style>
  .vn-sticky-shell{max-width:1200px;margin:0 auto}.vn-sticky-header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}.vn-sticky-header h2{margin:0}.vn-sticky-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.vn-sticky-actions input{width:min(260px,70vw)}.vn-sticky-status{min-height:28px;padding:8px 2px;color:var(--muted,#aaa);font-size:13px}.vn-sticky-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;align-items:start}.vn-sticky-empty{grid-column:1/-1;padding:35px;text-align:center;color:var(--muted,#aaa);border:1px dashed rgba(255,255,255,.18);border-radius:12px}.vn-sticky-note{min-height:230px;padding:13px;border-radius:6px 6px 12px 6px;color:#282522;box-shadow:0 12px 28px rgba(0,0,0,.28),inset 0 1px rgba(255,255,255,.45);transform:rotate(var(--tilt,0deg));transition:transform .15s ease,box-shadow .15s ease}.vn-sticky-note:focus-within{transform:rotate(0deg) translateY(-2px);box-shadow:0 18px 34px rgba(0,0,0,.34)}.vn-sticky-yellow{background:#ffe88a}.vn-sticky-pink{background:#ffb8d1}.vn-sticky-blue{background:#a9ddff}.vn-sticky-green{background:#b8edb1}.vn-sticky-purple{background:#d6c0ff}.vn-sticky-orange{background:#ffc494}.vn-sticky-note-head{display:flex;gap:7px;align-items:center}.vn-sticky-title{flex:1;min-width:0;border:0;border-bottom:1px solid rgba(40,37,34,.2);background:transparent;padding:5px 2px;color:inherit;font:700 17px system-ui}.vn-sticky-title:focus,.vn-sticky-body:focus{outline:2px solid rgba(35,80,130,.35);outline-offset:2px}.vn-sticky-color{width:34px;height:30px;border:1px solid rgba(40,37,34,.25);border-radius:6px;background:rgba(255,255,255,.35);color:#282522}.vn-sticky-delete{width:30px;height:30px;border:0;border-radius:50%;background:rgba(50,25,30,.1);color:#7c2433;font-size:18px;cursor:pointer}.vn-sticky-body{display:block;width:100%;min-height:155px;resize:vertical;border:0;background:transparent;padding:12px 2px 4px;color:inherit;font:15px/1.45 system-ui}.vn-sticky-foot{display:flex;justify-content:flex-end;min-height:18px;font-size:11px;color:rgba(40,37,34,.62)}.vn-sticky-note [disabled]{opacity:.78;cursor:default}@media(max-width:600px){.vn-sticky-actions{width:100%}.vn-sticky-actions input{flex:1;width:auto}.vn-sticky-grid{grid-template-columns:1fr}}
</style>
{% endblock %}
